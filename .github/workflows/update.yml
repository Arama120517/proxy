name: 更新节点

on:
  schedule:
    - cron: "0 4,16 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
        ports:
          - 8191:8191
      subconverter:
        image: asdlokj1qpi23/subconverter:latest@sha256:8e078a1b156e554d2d6438e0b155a7624bb094d6c6e5eb5f756912893bf9e11f
        ports:
          - 25500:25500
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-python: true

      - name: 初始化
        id: init
        run: |
          echo "TITLE=$(date +'%Y年%m月%d日')" >> $GITHUB_OUTPUT
          echo ${{ github.token }} | gh auth login --with-token
          gh release delete --cleanup-tag --yes "results" || true

          wget -q https://github.com/beck-8/subs-check/releases/latest/download/subs-check_Linux_x86_64.tar.gz -O ${{ github.workspace }}/subs-check.tar.gz
          tar -xzf ${{ github.workspace }}/subs-check.tar.gz -C ${{ github.workspace }} subs-check
          chmod +x ${{ github.workspace }}/subs-check

          uv sync --no-dev

      - name: 恢复历史节点
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/output/history
          key: none # 这里需要让他恢复之前的缓存但是key必须定义
          restore-keys: |
            history-

      - name: 获取节点
        env:
          JEGO_CLOUD_USERNAME: ${{ secrets.JEGO_CLOUD_USERNAME }}
          JEGO_CLOUD_PASSWORD: ${{ secrets.JEGO_CLOUD_PASSWORD }}
        run: |
          for f in $(find ${{ github.workspace }}/src/proxy -maxdepth 1 -type f -name "*.py" ! -name "__init__.py" ! -name "__main__.py" ! -name "utils.py" -printf '%f\n'); do
              uv run --no-dev -m proxy."${f%.py}" &
          done
          wait || true

      - name: 更新节点
        run: uv run --no-dev -m proxy > /dev/null 2>&1 & sleep 2 && ${{ github.workspace }}/subs-check -f ${{ github.workspace }}/.github/subs-check.yaml || true

      - name: 发布
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          draft: false
          prerelease: false
          files: |
            ${{ github.workspace }}/results.json
          overwrite_files: true
          name: ${{ steps.init.outputs.TITLE }}
          tag_name: results
          fail_on_unmatched_files: true
          token: ${{ github.token }}
          make_latest: true

      - name: 保存历史节点
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/output/history
          key: history-${{ github.run_id }}
