name: 更新节点

on:
  schedule:
    - cron: "0 4,16 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
        ports:
          - 8191:8191
      subconverter:
        image: asdlokj1qpi23/subconverter:latest@sha256:07de15705a14b10664d424fe3234a678251eab4ad3d837b44373483a1dd3778a
        ports:
          - 25500:25500
    steps:
      - name: Get github app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: get_token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.get_token.outputs.token }}

      - name: Setup UV
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Restore history
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/output/history
          key: none
          restore-keys: |
            history-

      - name: Get subs for local
        env:
          JEGO_CLOUD_USERNAME: ${{ secrets.JEGO_CLOUD_USERNAME }}
          JEGO_CLOUD_PASSWORD: ${{ secrets.JEGO_CLOUD_PASSWORD }}
        run: |
          for f in $(find ${{ github.workspace }}/src/proxy -maxdepth 1 -type f -name "*.py" ! -name "__init__.py" ! -name "merge.py" ! -name "utils.py" -printf '%f\n'); do
              uv run --no-dev -m proxy."${f%.py}" &
          done
          wait || true
          uv run --no-dev -m proxy.merge

      - name: Update
        run: |
          wget -q https://github.com/beck-8/subs-check/releases/latest/download/subs-check_Linux_x86_64.tar.gz -O ${{ github.workspace }}/subs-check.tar.gz
          tar -xzf ${{ github.workspace }}/subs-check.tar.gz -C ${{ github.workspace }} subs-check
          chmod +x ${{ github.workspace }}/subs-check
          ${{ github.workspace }}/subs-check || true

      - name: Release
        run: |
          echo ${{ steps.get_token.outputs.token }} | gh auth login --with-token
          gh release delete --cleanup-tag --yes "results" || true  
          gh release create "results" ${{ github.workspace }}/results.json --title "$(date +'%Y年%m月%d日')" --latest

      - name: Save history
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/output/history
          key: history-${{ github.run_id }}
