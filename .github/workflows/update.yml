name: 自动更新

on:
  schedule:
    - cron: "45 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: 下载GeoIP数据库
        run: wget https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb -O Country.mmdb

      - name: 运行程序
        run: |
          uv sync
          uv run --no-dev -m proxy
        env:
          JEGOCLOUD_USERNAME: ${{ secrets.JEGOCLOUD_USERNAME }}
          JEGOCLOUD_PASSWORD: ${{ secrets.JEGOCLOUD_PASSWORD }}

      - name: 获取日期
        run: |
          echo "TITLE=$(date +'%Y年%m月%d日')" >> $GITHUB_ENV
          echo "TAG=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 创建发行版
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: ${{ env.TITLE }}
          tag_name: ${{ env.TAG }}
          files: result.json
          body_path: ./release_notes.md