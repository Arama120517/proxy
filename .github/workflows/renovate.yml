name: CodeQL

on:
  schedule:
    - cron: "0 0 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: write
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@v46.1.10
        with:
          configurationFile: .github/renovate.json
          token: ${{ github.token }}
