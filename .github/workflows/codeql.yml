name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '16 17 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - python
    steps:
      - uses: actions/checkout@v6

      - name: 初始化
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: 运行检查
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
